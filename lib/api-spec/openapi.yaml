openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Knouz Arabic E-Commerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: orders
    description: Order operations
  - name: reviews
    description: Review operations
  - name: coupons
    description: Coupon operations
  - name: upload
    description: File upload
  - name: admin
    description: Admin operations
  - name: wishlist
    description: Wishlist operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with filters
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, popular, price_asc, price_desc]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /products/{id}/reviews:
    get:
      operationId: listProductReviews
      tags: [reviews]
      summary: Get reviews for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin = all, user = own)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/track:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track order by number and phone
      parameters:
        - name: orderNumber
          in: query
          required: true
          schema:
            type: string
        - name: phone
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order tracking info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    put:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /coupons/validate:
    post:
      operationId: validateCoupon
      tags: [coupons]
      summary: Validate a coupon code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponValidateInput"
      responses:
        "200":
          description: Coupon result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponResult"
        "400":
          description: Invalid or expired coupon

  /coupons:
    get:
      operationId: listCoupons
      tags: [coupons]
      summary: List all coupons (admin)
      responses:
        "200":
          description: Coupons list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
    post:
      operationId: createCoupon
      tags: [coupons]
      summary: Create a coupon (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /coupons/{id}:
    delete:
      operationId: deleteCoupon
      tags: [coupons]
      summary: Delete coupon (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /upload:
    post:
      operationId: uploadImage
      tags: [upload]
      summary: Upload image to Cloudinary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadInput"
      responses:
        "200":
          description: Uploaded URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/sales-chart:
    get:
      operationId: getSalesChart
      tags: [admin]
      summary: Get monthly sales data for chart
      responses:
        "200":
          description: Monthly sales data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlySales"

  /admin/category-sales:
    get:
      operationId: getCategorySales
      tags: [admin]
      summary: Get revenue breakdown by category
      responses:
        "200":
          description: Category sales data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySales"

  /admin/customers:
    get:
      operationId: listAdminCustomers
      tags: [admin]
      summary: List customers with order stats
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCustomerList"

  /admin/customers/{userId}/orders:
    get:
      operationId: getCustomerOrders
      tags: [admin]
      summary: Get orders for a specific customer
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/orders/export:
    get:
      operationId: exportOrders
      tags: [admin]
      summary: Export orders as CSV
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      summary: Get user wishlist product details
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
            description: Comma-separated product IDs
      responses:
        "200":
          description: Wishlist products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /payment/paymob:
    post:
      operationId: initiatePayment
      tags: [orders]
      summary: Initiate Paymob payment and get iframe URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInitInput"
      responses:
        "200":
          description: Paymob iframe URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentInitResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      required: [id, nameAr, slug]
      properties:
        id:
          type: string
        nameAr:
          type: string
        slug:
          type: string
        image:
          type: ["string", "null"]
        productCount:
          type: ["integer", "null"]

    CategoryInput:
      type: object
      required: [nameAr, slug]
      properties:
        nameAr:
          type: string
        slug:
          type: string
        image:
          type: string

    Product:
      type: object
      required: [id, nameAr, descriptionAr, price, stock, images, categoryId]
      properties:
        id:
          type: string
        nameAr:
          type: string
        descriptionAr:
          type: string
        price:
          type: number
        comparePrice:
          type: ["number", "null"]
        stock:
          type: integer
        images:
          type: array
          items:
            type: string
        categoryId:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        featured:
          type: boolean
        avgRating:
          type: ["number", "null"]
        reviewCount:
          type: ["integer", "null"]
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [nameAr, descriptionAr, price, stock, images, categoryId]
      properties:
        nameAr:
          type: string
        descriptionAr:
          type: string
        price:
          type: number
        comparePrice:
          type: ["number", "null"]
        stock:
          type: integer
        images:
          type: array
          items:
            type: string
        categoryId:
          type: string
        featured:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        nameAr:
          type: string
        descriptionAr:
          type: string
        price:
          type: number
        comparePrice:
          type: ["number", "null"]
        stock:
          type: integer
        images:
          type: array
          items:
            type: string
        categoryId:
          type: string
        featured:
          type: boolean

    ProductList:
      type: object
      required: [products, total, page, totalPages]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer

    Review:
      type: object
      required: [id, productId, rating]
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: ["string", "null"]
        productId:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
        comment:
          type: string
        userId:
          type: string
        userName:
          type: string

    Order:
      type: object
      required: [id, status, total, items]
      properties:
        id:
          type: string
        orderNumber:
          type: ["string", "null"]
        userId:
          type: ["string", "null"]
        status:
          type: string
          enum: [PENDING, PROCESSING, SHIPPED, DELIVERED, CANCELLED]
        total:
          type: number
        shippingAddress:
          type: object
          additionalProperties: true
        paymentMethod:
          type: string
        paymentStatus:
          type: string
        couponCode:
          type: ["string", "null"]
        discount:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string

    OrderItem:
      type: object
      required: [id, productId, quantity, price]
      properties:
        id:
          type: string
        productId:
          type: string
        productName:
          type: ["string", "null"]
        productImage:
          type: ["string", "null"]
        quantity:
          type: integer
        price:
          type: number

    OrderInput:
      type: object
      required: [total, items, shippingAddress, paymentMethod]
      properties:
        userId:
          type: string
        total:
          type: number
        shippingAddress:
          type: object
          additionalProperties: true
        paymentMethod:
          type: string
        couponCode:
          type: string
        discount:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderItemInput:
      type: object
      required: [productId, quantity, price]
      properties:
        productId:
          type: string
        quantity:
          type: integer
        price:
          type: number

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [PENDING, PROCESSING, SHIPPED, DELIVERED, CANCELLED]
        paymentStatus:
          type: string

    OrderList:
      type: object
      required: [orders, total, page, totalPages]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer

    Coupon:
      type: object
      required: [id, code, discount, type]
      properties:
        id:
          type: string
        code:
          type: string
        discount:
          type: number
        type:
          type: string
          enum: [PERCENTAGE, FIXED]
        minOrder:
          type: number
        expiresAt:
          type: ["string", "null"]
        usageLimit:
          type: ["integer", "null"]
        usedCount:
          type: integer

    CouponInput:
      type: object
      required: [code, discount, type]
      properties:
        code:
          type: string
        discount:
          type: number
        type:
          type: string
          enum: [PERCENTAGE, FIXED]
        minOrder:
          type: number
        expiresAt:
          type: string
        usageLimit:
          type: integer

    CouponValidateInput:
      type: object
      required: [code, orderTotal]
      properties:
        code:
          type: string
        orderTotal:
          type: number

    CouponResult:
      type: object
      required: [valid, discount, type, discountAmount]
      properties:
        valid:
          type: boolean
        discount:
          type: number
        type:
          type: string
        discountAmount:
          type: number
        message:
          type: ["string", "null"]

    UploadInput:
      type: object
      required: [data]
      properties:
        data:
          type: string
          description: Base64 encoded image data URI

    UploadResult:
      type: object
      required: [url]
      properties:
        url:
          type: string
        publicId:
          type: ["string", "null"]

    AdminStats:
      type: object
      required: [totalRevenue, totalOrders, totalCustomers, lowStockCount, pendingOrders, recentOrders]
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        totalCustomers:
          type: integer
        lowStockCount:
          type: integer
        pendingOrders:
          type: integer
        todayOrders:
          type: integer
        totalProducts:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        lowStockProducts:
          type: array
          items:
            $ref: "#/components/schemas/LowStockProduct"

    LowStockProduct:
      type: object
      required: [id, nameAr, stock]
      properties:
        id:
          type: string
        nameAr:
          type: string
        stock:
          type: integer

    AdminCustomer:
      type: object
      required: [userId, orderCount, totalSpend]
      properties:
        userId:
          type: string
        name:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        orderCount:
          type: integer
        totalSpend:
          type: number
        createdAt:
          type: ["string", "null"]

    AdminCustomerList:
      type: object
      required: [customers, total, page]
      properties:
        customers:
          type: array
          items:
            $ref: "#/components/schemas/AdminCustomer"
        total:
          type: integer
        page:
          type: integer

    CategorySales:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: number

    MonthlySales:
      type: object
      required: [month, revenue, orders]
      properties:
        month:
          type: string
        revenue:
          type: number
        orders:
          type: integer

    PaymentInitInput:
      type: object
      required: [orderId, amountCents, billingData]
      properties:
        orderId:
          type: string
        amountCents:
          type: integer
        billingData:
          type: object
          additionalProperties: true

    PaymentInitResult:
      type: object
      required: [iframeUrl]
      properties:
        iframeUrl:
          type: string
        paymentKey:
          type: ["string", "null"]
