kind = "web"
previewPath = "/"
title = "كنوز (Knouz) — Arabic E-Commerce"
version = "1.0.0"
id = "artifacts/knouz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22272

[services.development]
run = "pnpm --filter @workspace/knouz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/knouz", "run", "build" ]
publicDir = "artifacts/knouz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22272"
BASE_PATH = "/"
